services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - ${APP_PORT:-3000}:3000
    environment:
      PORT: 3000
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-puntuaciones}

  mongo:
    image: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - ${MONGO_PORT:-27017}:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}

  mongo-express:
    image: mongo-express
    depends_on:
      - mongo
    restart: unless-stopped
    ports:
      - ${MONGO_EXPRESS_PORT:-8081}:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-example}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-example}@mongo:27017/
      ME_CONFIG_BASICAUTH: false

volumes:
  mongo_data:
