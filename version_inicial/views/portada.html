{% extends 'base.html' %}

{% block title %}Portada{% endblock %}

{% block contenido %}
  <div class="cabecera">
    <p class="eyebrow">Practica 4</p>
    <h1>Seminarios</h1>
    <p class="subtitulo">
      Selecciona un seminario y decide si quieres puntuarlo o consultar las puntuaciones guardadas.
    </p>
  </div>

  {% if aviso %}
    <p class="aviso" id="aviso">
      <span>{{ aviso }}</span>
      <span id="cerrar-aviso">x</span>
    </p>
  {% endif %}

  <div class="panel">
    <form action="" method="GET">
      <label for="seminarios">Elige un seminario:</label>
      <select id="seminarios" name="seminario_de">
        {% for seminario in seminarios %}
          <option value="{{ seminario.autor }}">
            {{ seminario.titulo }} - {{ seminario.autor }}
          </option>
        {% endfor %}
      </select>

      <div class="acciones">
        <button type="submit" formaction="/puntuar">Puntuar</button>
        <button type="submit" formaction="/ver-puntuaciones" class="boton-secundario">
          Ver puntuaciones
        </button>
      </div>
    </form>
  </div>

  <script>
    const cerrar = document.getElementById('cerrar-aviso');
    const aviso = document.getElementById('aviso');

    if (cerrar && aviso) {
      cerrar.addEventListener('click', () => {
        aviso.style.display = 'none';
      });
    }
  </script>
{% endblock %}
