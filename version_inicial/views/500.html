{% extends 'base.html' %}

{% block title %}500{% endblock %}

{% block contenido %}

    <p class="eyebrow">Error 500</p>
    <h1 class="estado-codigo">Error interno</h1>
    <p class="subtitulo estado-texto">{{ mensaje }}</p>

{% endblock %}
